<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#15171A" />
<title>Site Log</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #15171A; color: #E8E6E0; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }
  body { padding-bottom: 40px; }
  input, select, button, textarea { font-family: inherit; color: inherit; }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; }

  #app-header { padding: 20px 16px 14px; border-bottom: 1px solid #31353B; }
  #app-header .top-row { display: flex; justify-content: space-between; align-items: flex-start; }
  #app-header .eyebrow { font-size: 11px; letter-spacing: 2px; color: #FF7A1A; font-weight: 700; text-transform: uppercase; }
  #app-header .title { font-size: 20px; font-weight: 800; margin-top: 2px; }
  #app-header .stamp { font-family: ui-monospace, monospace; border: 1px solid #31353B; border-radius: 6px; padding: 3px 8px; font-size: 10px; color: #8B9096; transform: rotate(2deg); white-space: nowrap; }
  #app-header .today-row { display: flex; align-items: baseline; gap: 8px; margin-top: 14px; }
  #app-header .today-points { font-size: 42px; font-weight: 800; color: #3DDC97; line-height: 1; }
  #app-header .today-sub { font-size: 13px; color: #8B9096; }
  #app-header .today-pct-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid #31353B; }
  #app-header .today-pct-label { font-size: 11px; color: #8B9096; text-transform: uppercase; letter-spacing: 0.5px; }
  #app-header .today-pct-val { font-size: 16px; font-weight: 800; }

  #tabs { display: flex; gap: 6px; padding: 12px 16px; }
  #tabs button { flex: 1; padding: 10px 6px; background: transparent; color: #8B9096; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; letter-spacing: 0.3px; cursor: pointer; }
  #tabs button.active { background: #FF7A1A; color: #171717; }

  #content { padding: 0 16px; }
  .tab-section { display: none; }
  .tab-section.active { display: block; }

  #error-banner { display: none; background: #3A2020; border: 1px solid #E5544C; color: #FFB3AE; border-radius: 8px; padding: 8px 12px; font-size: 13px; margin-bottom: 12px; }

  .panel { background: #1C1F23; border: 1px solid #31353B; border-radius: 12px; padding: 16px; }
  .panel-label { font-size: 11px; letter-spacing: 1.5px; color: #8B9096; font-weight: 700; margin-bottom: 12px; text-transform: uppercase; }
  .field-label { font-size: 12px; color: #8B9096; display: block; margin-top: 10px; }
  .field-label:first-child { margin-top: 0; }
  .hint { font-weight: 400; }
  input[type=text], input[type=number], input[type=date], select {
    width: 100%; background: #23262B; border: 1px solid #31353B; border-radius: 7px; color: #E8E6E0;
    padding: 9px 10px; font-size: 14px; margin-top: 4px; outline: none; color-scheme: dark;
  }
  .row3 { display: flex; gap: 10px; margin-top: 10px; }
  .row3 > div { flex: 1; }
  .preview { font-size: 12px; margin-top: 10px; }
  .preview.pts { color: #3DDC97; }
  .preview.manual { color: #FF7A1A; }
  .form-buttons { display: flex; gap: 8px; margin-top: 14px; }
  .btn-primary { flex: 1; background: #FF7A1A; color: #171717; border: none; border-radius: 8px; padding: 11px 0; font-weight: 800; font-size: 14px; cursor: pointer; }
  .btn-secondary { background: transparent; color: #8B9096; border: 1px solid #31353B; border-radius: 8px; padding: 11px 16px; font-weight: 700; font-size: 14px; cursor: pointer; }

  .section-label { font-size: 11px; letter-spacing: 1.5px; color: #8B9096; font-weight: 700; margin: 16px 0 10px; text-transform: uppercase; }
  .section-label:first-child { margin-top: 0; }

  .entry-row { background: #1C1F23; border: 1px solid #31353B; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .entry-row .info { min-width: 0; }
  .entry-row .job { font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .entry-row .meta { font-size: 11px; color: #8B9096; margin-top: 2px; }
  .entry-row .right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .entry-row .pts { font-size: 16px; font-weight: 800; color: #3DDC97; }
  .entry-row .pts.manual { color: #FF7A1A; }
  .entry-row .pts-pct { font-size: 12px; font-weight: 700; }
  .entry-row button { background: none; border: none; cursor: pointer; font-size: 13px; padding: 4px; }
  .entry-row .edit-btn { color: #8B9096; }
  .entry-row .delete-btn { color: #E5544C; }

  .empty-state { border: 1px dashed #31353B; border-radius: 12px; padding: 22px 14px; text-align: center; color: #8B9096; font-size: 13px; }

  .day-group-label { font-size: 11px; color: #8B9096; font-weight: 700; margin: 10px 0 6px; }

  .nav-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .nav-btn { background: #1C1F23; border: 1px solid #31353B; color: #E8E6E0; border-radius: 8px; width: 36px; height: 36px; font-size: 18px; cursor: pointer; }
  .nav-center { text-align: center; }
  .nav-center .label { font-size: 14px; font-weight: 700; }
  .nav-center button { background: none; border: none; color: #FF7A1A; font-size: 11px; cursor: pointer; padding: 2px; }

  .stat-row { display: flex; gap: 8px; }
  .stat-box { flex: 1; background: #1C1F23; border: 1px solid #31353B; border-radius: 12px; padding: 10px; }
  .stat-box .stat-label { font-size: 9px; color: #8B9096; letter-spacing: 0.5px; text-transform: uppercase; }
  .stat-box .stat-value { font-size: 21px; font-weight: 800; }

  .bar-chart { display: flex; gap: 6px; align-items: flex-end; height: 90px; margin: 16px 0 8px; background: #1C1F23; border: 1px solid #31353B; border-radius: 12px; padding: 12px 10px 8px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar { width: 100%; border-radius: 3px; background: #3DDC97; }
  .bar.today { background: #FF7A1A; }
  .bar-day-label { font-size: 10px; color: #8B9096; }

  .pct-list { background: #1C1F23; border: 1px solid #31353B; border-radius: 12px; padding: 4px 14px; margin-bottom: 8px; }
  .pct-list-head { display: flex; justify-content: space-between; padding: 8px 0 6px; font-size: 10px; color: #8B9096; text-transform: uppercase; letter-spacing: 1px; }
  .pct-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-top: 1px solid #31353B; cursor: pointer; }
  .pct-row .day-name { font-size: 13px; }
  .pct-row .pct-val { font-size: 13px; font-weight: 700; }

  .job-list { background: #1C1F23; border: 1px solid #31353B; border-radius: 12px; padding: 4px 14px; }
  .job-row { display: flex; justify-content: space-between; padding: 10px 0; border-top: 1px solid #31353B; }
  .job-row:first-child { border-top: none; }
  .job-row .job-name { font-size: 14px; }
  .job-row .job-pts { font-size: 14px; color: #3DDC97; font-weight: 700; }

  .date-list-head { display: flex; justify-content: space-between; padding: 8px 0 6px; font-size: 10px; color: #8B9096; text-transform: uppercase; letter-spacing: 1px; }
  .date-row { display: flex; justify-content: space-between; padding: 10px 0; border-top: 1px solid #31353B; cursor: pointer; }
  .date-row .date-name { font-size: 14px; }
  .date-row .date-vals { display: flex; gap: 10px; }
  .date-row .date-pts { font-size: 14px; color: #3DDC97; font-weight: 700; }
  .date-row .date-pct { font-size: 14px; font-weight: 700; }
</style>
</head>
<body>

<div id="app-header">
  <div class="top-row">
    <div>
      <div class="eyebrow">Site Log</div>
      <div class="title">Job Productivity Ticket</div>
    </div>
    <div class="stamp">1 PT = 5 MIN</div>
  </div>
  <div class="today-row">
    <div class="today-points mono" id="hdr-points">0</div>
    <div class="today-sub" id="hdr-sub">pts today · 0m</div>
  </div>
  <div class="today-pct-row" id="hdr-pct-row">
    <span class="today-pct-label">Today's productivity</span>
    <span class="today-pct-val mono" id="hdr-pct">—</span>
  </div>
</div>

<div id="tabs">
  <button data-tab="log" class="active">LOG</button>
  <button data-tab="day">DAY</button>
  <button data-tab="week">WEEK</button>
  <button data-tab="month">MONTH</button>
</div>

<div id="content">
  <div id="error-banner"></div>

  <section id="tab-log" class="tab-section active">
    <form id="entry-form" class="panel" style="margin-bottom:18px;">
      <div class="panel-label" id="form-title">New entry</div>

      <label class="field-label">Job type</label>
      <select id="f-jobtype"></select>

      <div class="row3">
        <div>
          <label class="field-label">Hours</label>
          <input type="number" min="0" inputmode="numeric" id="f-hours" placeholder="0" />
        </div>
        <div>
          <label class="field-label">Minutes</label>
          <input type="number" min="0" max="59" inputmode="numeric" id="f-minutes" placeholder="0" />
        </div>
        <div>
          <label class="field-label">Date</label>
          <input type="date" id="f-date" />
        </div>
      </div>

      <label class="field-label">Work order points <span class="hint">(optional — overrides time-based points)</span></label>
      <input type="number" min="0" inputmode="numeric" id="f-manualpoints" placeholder="e.g. 12" />

      <label class="field-label">Description (optional)</label>
      <input type="text" id="f-description" placeholder="e.g. 142 Maple St, drop replacement" />

      <div class="preview" id="f-preview"></div>

      <div class="form-buttons">
        <button type="submit" class="btn-primary" id="submit-btn">Punch in entry</button>
        <button type="button" class="btn-secondary" id="cancel-edit-btn" style="display:none;">Cancel</button>
      </div>
    </form>

    <div class="section-label">Today's entries</div>
    <div id="log-today-entries"></div>
  </section>

  <section id="tab-day" class="tab-section">
    <div class="nav-header">
      <button class="nav-btn" data-nav="day-prev">‹</button>
      <div class="nav-center">
        <div class="label" id="day-label"></div>
        <button data-nav="day-today">Jump to today</button>
      </div>
      <button class="nav-btn" data-nav="day-next">›</button>
    </div>
    <div class="stat-row" id="day-stats"></div>

    <div class="section-label">Entries</div>
    <div id="day-entries"></div>
  </section>

  <section id="tab-week" class="tab-section">
    <div class="nav-header">
      <button class="nav-btn" data-nav="week-prev">‹</button>
      <div class="nav-center">
        <div class="label" id="week-label"></div>
        <button data-nav="week-today">Jump to today</button>
      </div>
      <button class="nav-btn" data-nav="week-next">›</button>
    </div>
    <div class="stat-row" id="week-stats"></div>
    <div class="bar-chart" id="week-bars"></div>
    <div class="pct-list" id="week-pct-list"></div>
    <div id="week-entries"></div>
  </section>

  <section id="tab-month" class="tab-section">
    <div class="nav-header">
      <button class="nav-btn" data-nav="month-prev">‹</button>
      <div class="nav-center">
        <div class="label" id="month-label"></div>
        <button data-nav="month-today">Jump to today</button>
      </div>
      <button class="nav-btn" data-nav="month-next">›</button>
    </div>
    <div class="stat-row" id="month-stats"></div>

    <div id="month-by-job-wrap">
      <div class="section-label">By job</div>
      <div class="job-list" id="month-by-job"></div>
    </div>

    <div class="section-label">By day</div>
    <div id="month-by-day"></div>
  </section>
</div>

<script>
(function () {
  "use strict";

  var JOB_TYPES = [
    "Fiber TC", "Fiber Install", "Coax TC", "Coax Install",
    "Coax Self Install Rescue", "Drop Hang", "Equipment Pickup", "Tech Assist", "FRC Fail"
  ];
  var JOB_TYPE_POINTS = {
    "Fiber TC": 15,
    "Coax TC": 15,
    "Coax Self Install Rescue": 15,
    "Coax Install": 18,
    "Equipment Pickup": 3,
    "FRC Fail": 0,
    "Fiber Install": 28
  };
  var DAY_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  var ENTRIES_KEY = "site-log-entries-v1";

  function pad(n) { return String(n).padStart(2, "0"); }
  function toISO(d) { return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()); }
  function fromISO(s) { var p = s.split("-").map(Number); return new Date(p[0], p[1] - 1, p[2]); }
  function todayISO() { return toISO(new Date()); }
  function startOfWeek(d) {
    var date = new Date(d); var day = date.getDay();
    var diff = day === 0 ? -6 : 1 - day;
    date.setDate(date.getDate() + diff); date.setHours(0,0,0,0);
    return date;
  }
  function addDays(d, n) { var date = new Date(d); date.setDate(date.getDate() + n); return date; }
  function minutesToHM(mins) {
    var h = Math.floor(mins / 60), m = mins % 60;
    if (h === 0) return m + "m";
    if (m === 0) return h + "h";
    return h + "h " + m + "m";
  }
  function fmtDateLong(d) { return DAY_NAMES[d.getDay()] + ", " + MONTH_NAMES[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear(); }
  function fmtDateShort(d) { return MONTH_NAMES[d.getMonth()].slice(0,3) + " " + d.getDate(); }
  function esc(s) {
    var div = document.createElement("div");
    div.textContent = s == null ? "" : String(s);
    return div.innerHTML;
  }

  var entries = [];
  var anchorDate = new Date();
  var editingId = null;
  var currentTab = "log";

  function loadState() {
    try {
      var e = localStorage.getItem(ENTRIES_KEY);
      entries = e ? JSON.parse(e) : [];
    } catch (err) { entries = []; }
  }
  function saveEntries() {
    try { localStorage.setItem(ENTRIES_KEY, JSON.stringify(entries)); }
    catch (err) { showError("Couldn't save — storage may be full."); }
  }
  function showError(msg) {
    var box = document.getElementById("error-banner");
    box.textContent = msg;
    box.style.display = "block";
  }
  function clearError() {
    var box = document.getElementById("error-banner");
    box.style.display = "none";
    box.textContent = "";
  }

  // productivity: points converted back to minutes, vs. the actual hours you entered for those jobs
  function productiveMinutes(list) { return list.reduce(function (s, x) { return s + x.points * 5; }, 0); }
  function sumPoints(list) { return list.reduce(function (s, x) { return s + x.points; }, 0); }
  function sumMinutes(list) { return list.reduce(function (s, x) { return s + x.minutes; }, 0); }
  function productivityPct(list) {
    var enteredMinutes = sumMinutes(list);
    if (enteredMinutes <= 0) return null;
    return Math.round((productiveMinutes(list) / enteredMinutes) * 100);
  }

  function populateJobTypeSelect() {
    var sel = document.getElementById("f-jobtype");
    sel.innerHTML = JOB_TYPES.map(function (jt) { return '<option value="' + esc(jt) + '">' + esc(jt) + "</option>"; }).join("");
  }

  function applyDefaultPoints() {
    var jobType = document.getElementById("f-jobtype").value;
    var manualField = document.getElementById("f-manualpoints");
    if (Object.prototype.hasOwnProperty.call(JOB_TYPE_POINTS, jobType)) {
      manualField.value = String(JOB_TYPE_POINTS[jobType]);
    } else {
      manualField.value = "";
    }
    updatePreview();
  }

  function resetForm() {
    document.getElementById("f-jobtype").value = JOB_TYPES[0];
    document.getElementById("f-hours").value = "";
    document.getElementById("f-minutes").value = "";
    document.getElementById("f-description").value = "";
    document.getElementById("f-date").value = todayISO();
    editingId = null;
    document.getElementById("form-title").textContent = "New entry";
    document.getElementById("submit-btn").textContent = "Punch in entry";
    document.getElementById("cancel-edit-btn").style.display = "none";
    applyDefaultPoints();
  }

  function updatePreview() {
    var hrs = parseInt(document.getElementById("f-hours").value, 10) || 0;
    var mins = parseInt(document.getElementById("f-minutes").value, 10) || 0;
    var manualRaw = document.getElementById("f-manualpoints").value;
    var preview = document.getElementById("f-preview");
    if (manualRaw !== "") {
      var mp = parseInt(manualRaw, 10) || 0;
      preview.className = "preview manual mono";
      preview.textContent = "= " + mp + " pts (work order)";
    } else if (hrs + mins > 0) {
      var pts = Math.round((hrs * 60 + mins) / 5);
      preview.className = "preview pts mono";
      preview.textContent = "= " + pts + " pts";
    } else {
      preview.textContent = "";
      preview.className = "preview";
    }
  }

  function submitEntry(ev) {
    ev.preventDefault();
    clearError();
    var jobType = document.getElementById("f-jobtype").value;
    var hrs = parseInt(document.getElementById("f-hours").value, 10) || 0;
    var mins = parseInt(document.getElementById("f-minutes").value, 10) || 0;
    var totalMinutes = hrs * 60 + mins;
    var dateVal = document.getElementById("f-date").value || todayISO();
    var description = document.getElementById("f-description").value.trim();
    var manualRaw = document.getElementById("f-manualpoints").value;
    var hasManual = manualRaw !== "" && !isNaN(parseInt(manualRaw, 10));

    if (totalMinutes <= 0 && !hasManual) {
      showError("Enter a duration or a work order point value.");
      return;
    }
    var points = hasManual ? parseInt(manualRaw, 10) : Math.round(totalMinutes / 5);

    var existing = editingId ? entries.find(function (x) { return x.id === editingId; }) : null;
    var entry = {
      id: editingId || (Date.now() + "-" + Math.random().toString(36).slice(2, 8)),
      date: dateVal,
      jobType: jobType,
      minutes: totalMinutes,
      points: points,
      manual: hasManual,
      description: description,
      createdAt: existing ? existing.createdAt : Date.now()
    };

    if (editingId) {
      entries = entries.map(function (x) { return x.id === editingId ? entry : x; });
    } else {
      entries.push(entry);
    }
    entries.sort(function (a, b) {
      if (a.date < b.date) return 1;
      if (a.date > b.date) return -1;
      return b.createdAt - a.createdAt;
    });
    saveEntries();
    resetForm();
    renderAll();
  }

  function editEntry(id) {
    var e = entries.find(function (x) { return x.id === id; });
    if (!e) return;
    editingId = id;
    document.getElementById("f-jobtype").value = e.jobType;
    document.getElementById("f-hours").value = e.minutes ? String(Math.floor(e.minutes / 60)) : "";
    document.getElementById("f-minutes").value = e.minutes ? String(e.minutes % 60) : "";
    document.getElementById("f-date").value = e.date;
    document.getElementById("f-description").value = e.description || "";
    document.getElementById("f-manualpoints").value = e.manual ? String(e.points) : "";
    document.getElementById("form-title").textContent = "Edit entry";
    document.getElementById("submit-btn").textContent = "Save changes";
    document.getElementById("cancel-edit-btn").style.display = "inline-block";
    updatePreview();
    switchTab("log");
  }

  function deleteEntry(id) {
    entries = entries.filter(function (x) { return x.id !== id; });
    saveEntries();
    if (editingId === id) resetForm();
    renderAll();
  }

  function entryRowHTML(e, hideDate) {
    var metaParts = [];
    if (!hideDate) metaParts.push(esc(fmtDateShort(fromISO(e.date))));
    if (e.minutes > 0) metaParts.push(minutesToHM(e.minutes));
    if (e.manual) metaParts.push("work order");
    if (e.description) metaParts.push(esc(e.description));

    var entryPct = e.minutes > 0 ? Math.round((e.points * 5 / e.minutes) * 100) : null;
    var pctColor = entryPct === null ? "#8B9096" : entryPct >= 80 ? "#3DDC97" : entryPct >= 50 ? "#FF7A1A" : "#E5544C";
    var pctHTML = entryPct === null ? "" : '<div class="pts-pct mono" style="color:' + pctColor + ';">' + entryPct + "%</div>";

    return (
      '<div class="entry-row">' +
        '<div class="info">' +
          '<div class="job">' + esc(e.jobType) + "</div>" +
          '<div class="meta">' + metaParts.join(" · ") + "</div>" +
        "</div>" +
        '<div class="right">' +
          '<div class="pts mono' + (e.manual ? " manual" : "") + '">' + e.points + "</div>" +
          pctHTML +
          '<button class="edit-btn" data-action="edit" data-id="' + e.id + '">Edit</button>' +
          '<button class="delete-btn" data-action="delete" data-id="' + e.id + '">Delete</button>' +
        "</div>" +
      "</div>"
    );
  }
  function emptyStateHTML(text) {
    return '<div class="empty-state">' + esc(text) + "</div>";
  }

  function renderHeader() {
    var todayEntries = entries.filter(function (x) { return x.date === todayISO(); });
    var pts = sumPoints(todayEntries);
    var mins = sumMinutes(todayEntries);
    document.getElementById("hdr-points").textContent = pts;
    document.getElementById("hdr-sub").textContent = "pts today · " + minutesToHM(mins);

    var pct = productivityPct(todayEntries);
    var pctEl = document.getElementById("hdr-pct");
    if (pct === null) {
      pctEl.textContent = "—";
      pctEl.style.color = "#8B9096";
    } else {
      pctEl.textContent = pct + "%";
      pctEl.style.color = pct >= 80 ? "#3DDC97" : pct >= 50 ? "#FF7A1A" : "#E5544C";
    }
  }

  function renderLogTab() {
    var todayEntries = entries.filter(function (x) { return x.date === todayISO(); });
    var container = document.getElementById("log-today-entries");
    container.innerHTML = todayEntries.length === 0
      ? emptyStateHTML("No entries logged today yet.")
      : todayEntries.map(function (e) { return entryRowHTML(e, false); }).join("");
  }

  function statRowHTML(points, minutes, pct) {
    var pctColor = pct === null ? "#8B9096" : pct >= 80 ? "#3DDC97" : pct >= 50 ? "#FF7A1A" : "#E5544C";
    var pctText = pct === null ? "—" : pct + "%";
    return (
      '<div class="stat-box"><div class="stat-label">Points</div><div class="stat-value mono" style="color:#3DDC97;">' + points + "</div></div>" +
      '<div class="stat-box"><div class="stat-label">Time</div><div class="stat-value mono">' + (minutes > 0 ? minutesToHM(minutes) : "0m") + "</div></div>" +
      '<div class="stat-box"><div class="stat-label">Productivity</div><div class="stat-value mono" style="color:' + pctColor + ';">' + pctText + "</div></div>"
    );
  }

  function renderDayTab() {
    document.getElementById("day-label").textContent = fmtDateLong(anchorDate);
    var iso = toISO(anchorDate);
    var dayEntries = entries.filter(function (x) { return x.date === iso; });
    var pct = productivityPct(dayEntries);
    document.getElementById("day-stats").innerHTML = statRowHTML(sumPoints(dayEntries), sumMinutes(dayEntries), pct);
    var container = document.getElementById("day-entries");
    container.innerHTML = dayEntries.length === 0 ? emptyStateHTML("Nothing logged this day.") : dayEntries.map(function (e) { return entryRowHTML(e, false); }).join("");
  }

  function renderWeekTab() {
    var weekStart = startOfWeek(anchorDate);
    var weekDays = [];
    for (var i = 0; i < 7; i++) weekDays.push(addDays(weekStart, i));
    var weekIsoSet = {};
    weekDays.forEach(function (d) { weekIsoSet[toISO(d)] = true; });
    var weekEntries = entries.filter(function (x) { return weekIsoSet[x.date]; });

    document.getElementById("week-label").textContent =
      fmtDateShort(weekStart) + " – " + fmtDateShort(addDays(weekStart, 6)) + ", " + weekStart.getFullYear();

    var weekByDay = weekDays.map(function (d) {
      var iso = toISO(d);
      var es = weekEntries.filter(function (x) { return x.date === iso; });
      return { date: d, points: sumPoints(es), pct: productivityPct(es) };
    });
    var weekPct = productivityPct(weekEntries);

    document.getElementById("week-stats").innerHTML = statRowHTML(sumPoints(weekEntries), sumMinutes(weekEntries), weekPct);

    var maxPts = Math.max(1, Math.max.apply(null, weekByDay.map(function (d) { return d.points; })));
    var todayStr = todayISO();
    document.getElementById("week-bars").innerHTML = weekByDay.map(function (d) {
      var iso = toISO(d.date);
      var h = Math.max(3, (d.points / maxPts) * 55);
      var isToday = iso === todayStr;
      return (
        '<div class="bar-col">' +
          '<div class="bar' + (isToday ? " today" : "") + '" style="height:' + h + "px; opacity:" + (d.points === 0 ? "0.25" : "1") + ';"></div>' +
          '<div class="bar-day-label">' + DAY_NAMES[d.date.getDay()] + "</div>" +
        "</div>"
      );
    }).join("");

    var pctListHTML = '<div class="pct-list-head"><span>Day</span><span>Productivity</span></div>';
    pctListHTML += weekByDay.map(function (d) {
      var iso = toISO(d.date);
      var pctColor = d.pct === null ? "#8B9096" : d.pct >= 80 ? "#3DDC97" : d.pct >= 50 ? "#FF7A1A" : "#E5544C";
      var pctText = d.pct === null ? "— no entries" : d.pct + "%";
      return (
        '<div class="pct-row" data-action="goto-day" data-date="' + iso + '">' +
          '<span class="day-name">' + esc(fmtDateLong(d.date)) + "</span>" +
          '<span class="pct-val mono" style="color:' + pctColor + ';">' + pctText + "</span>" +
        "</div>"
      );
    }).join("");
    document.getElementById("week-pct-list").innerHTML = pctListHTML;

    var entriesHTML = "";
    if (weekEntries.length === 0) {
      entriesHTML = emptyStateHTML("Nothing logged this week.");
    } else {
      weekDays.forEach(function (d) {
        var iso = toISO(d);
        var es = weekEntries.filter(function (x) { return x.date === iso; });
        if (es.length === 0) return;
        entriesHTML += '<div class="day-group-label">' + esc(fmtDateLong(d)).toUpperCase() + "</div>";
        entriesHTML += es.map(function (e) { return entryRowHTML(e, true); }).join("");
      });
    }
    document.getElementById("week-entries").innerHTML = entriesHTML;
  }

  function renderMonthTab() {
    var y = anchorDate.getFullYear(), m = anchorDate.getMonth();
    document.getElementById("month-label").textContent = MONTH_NAMES[m] + " " + y;

    var monthEntries = entries.filter(function (x) {
      var d = fromISO(x.date);
      return d.getFullYear() === y && d.getMonth() === m;
    });
    var monthPct = productivityPct(monthEntries);

    document.getElementById("month-stats").innerHTML = statRowHTML(sumPoints(monthEntries), sumMinutes(monthEntries), monthPct);

    var jobMap = {};
    monthEntries.forEach(function (x) { jobMap[x.jobType] = (jobMap[x.jobType] || 0) + x.points; });
    var jobEntries = Object.keys(jobMap).map(function (k) { return [k, jobMap[k]]; }).sort(function (a, b) { return b[1] - a[1]; });
    var jobWrap = document.getElementById("month-by-job-wrap");
    if (jobEntries.length === 0) {
      jobWrap.style.display = "none";
    } else {
      jobWrap.style.display = "block";
      document.getElementById("month-by-job").innerHTML = jobEntries.map(function (pair) {
        return '<div class="job-row"><span class="job-name">' + esc(pair[0]) + '</span><span class="job-pts mono">' + pair[1] + " pt</span></div>";
      }).join("");
    }

    var dateMap = {};
    monthEntries.forEach(function (x) {
      if (!dateMap[x.date]) dateMap[x.date] = { points: 0, list: [] };
      dateMap[x.date].points += x.points;
      dateMap[x.date].list.push(x);
    });
    var dateRows = Object.keys(dateMap).map(function (iso) {
      var v = dateMap[iso];
      return { iso: iso, points: v.points, pct: productivityPct(v.list) };
    }).sort(function (a, b) { return a.iso < b.iso ? 1 : -1; });

    var byDayContainer = document.getElementById("month-by-day");
    if (dateRows.length === 0) {
      byDayContainer.innerHTML = emptyStateHTML("Nothing logged this month.");
    } else {
      var html = '<div class="job-list"><div class="date-list-head"><span>Date</span><span>Points · Productivity</span></div>';
      html += dateRows.map(function (r) {
        var pctColor = r.pct === null ? "#8B9096" : r.pct >= 80 ? "#3DDC97" : r.pct >= 50 ? "#FF7A1A" : "#E5544C";
        var pctText = r.pct === null ? "—" : r.pct + "%";
        return (
          '<div class="date-row" data-action="goto-day" data-date="' + r.iso + '">' +
            '<span class="date-name">' + esc(fmtDateLong(fromISO(r.iso))) + "</span>" +
            '<span class="date-vals"><span class="date-pts mono">' + r.points + ' pt</span>' +
            '<span class="date-pct mono" style="color:' + pctColor + ';">' + pctText + "</span></span>" +
          "</div>"
        );
      }).join("");
      html += "</div>";
      byDayContainer.innerHTML = html;
    }
  }

  function renderAll() {
    renderHeader();
    renderLogTab();
    renderDayTab();
    renderWeekTab();
    renderMonthTab();
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll("#tabs button").forEach(function (b) {
      b.classList.toggle("active", b.getAttribute("data-tab") === tab);
    });
    document.querySelectorAll(".tab-section").forEach(function (s) {
      s.classList.toggle("active", s.id === "tab-" + tab);
    });
  }

  function init() {
    loadState();
    populateJobTypeSelect();
    document.getElementById("f-date").value = todayISO();

    document.getElementById("entry-form").addEventListener("submit", submitEntry);
    document.getElementById("cancel-edit-btn").addEventListener("click", resetForm);
    document.getElementById("f-jobtype").addEventListener("change", applyDefaultPoints);
    ["f-hours", "f-minutes", "f-manualpoints"].forEach(function (id) {
      document.getElementById(id).addEventListener("input", updatePreview);
    });

    document.querySelectorAll("#tabs button").forEach(function (b) {
      b.addEventListener("click", function () { switchTab(b.getAttribute("data-tab")); });
    });

    document.body.addEventListener("click", function (ev) {
      var editBtn = ev.target.closest('[data-action="edit"]');
      if (editBtn) { editEntry(editBtn.getAttribute("data-id")); return; }
      var delBtn = ev.target.closest('[data-action="delete"]');
      if (delBtn) { deleteEntry(delBtn.getAttribute("data-id")); return; }
      var gotoBtn = ev.target.closest('[data-action="goto-day"]');
      if (gotoBtn) {
        anchorDate = fromISO(gotoBtn.getAttribute("data-date"));
        switchTab("day");
        renderAll();
        return;
      }
      var navBtn = ev.target.closest("[data-nav]");
      if (navBtn) {
        var nav = navBtn.getAttribute("data-nav");
        if (nav === "day-prev") anchorDate = addDays(anchorDate, -1);
        else if (nav === "day-next") anchorDate = addDays(anchorDate, 1);
        else if (nav === "day-today") anchorDate = new Date();
        else if (nav === "week-prev") anchorDate = addDays(anchorDate, -7);
        else if (nav === "week-next") anchorDate = addDays(anchorDate, 7);
        else if (nav === "week-today") anchorDate = new Date();
        else if (nav === "month-prev") anchorDate = new Date(anchorDate.getFullYear(), anchorDate.getMonth() - 1, 1);
        else if (nav === "month-next") anchorDate = new Date(anchorDate.getFullYear(), anchorDate.getMonth() + 1, 1);
        else if (nav === "month-today") anchorDate = new Date();
        renderAll();
      }
    });

    resetForm();
    renderAll();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
