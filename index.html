<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#15171A" />
<title>Site Log</title>
<style>
  html, body { margin: 0; padding: 0; background: #15171A; }
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  input, select, button { font-family: inherit; }
  #error-box { display:none; background:#3A2020; color:#FFB3AE; font-family: ui-monospace, monospace; font-size: 13px; padding: 16px; margin: 16px; border-radius: 10px; border: 1px solid #E5544C; white-space: pre-wrap; word-break: break-word; }
  #loading { color: #8B9096; font-family: system-ui, sans-serif; padding: 20px; text-align: center; }
</style>
</head>
<body>
<div id="loading">Loading Site Log…</div>
<div id="error-box"></div>
<div id="root"></div>

<script>
  // Surface any error directly on the page so it's visible without a console.
  window.addEventListener('error', function (e) {
    var box = document.getElementById('error-box');
    var loading = document.getElementById('loading');
    if (loading) loading.style.display = 'none';
    box.style.display = 'block';
    box.textContent = 'Error loading app:\n\n' + (e.message || e.error) + '\n\nFile: ' + (e.filename || 'inline') + '\nLine: ' + (e.lineno || '?');
  });
</script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script>
  // ---- localStorage-backed shim matching the window.storage API used by the app ----
  window.storage = {
    get: async (key, shared) => {
      const raw = localStorage.getItem('site-log:' + key);
      if (raw === null) return null;
      return { key, value: raw, shared: !!shared };
    },
    set: async (key, value, shared) => {
      localStorage.setItem('site-log:' + key, value);
      return { key, value, shared: !!shared };
    },
    delete: async (key, shared) => {
      localStorage.removeItem('site-log:' + key);
      return { key, deleted: true, shared: !!shared };
    },
    list: async (prefix, shared) => {
      const keys = Object.keys(localStorage)
        .filter((k) => k.startsWith('site-log:' + (prefix || '')))
        .map((k) => k.replace('site-log:', ''));
      return { keys, prefix, shared: !!shared };
    },
  };

  // hide the loading indicator once React actually mounts something
  window.addEventListener('DOMContentLoaded', function() {
    setTimeout(function() {
      var root = document.getElementById('root');
      var loading = document.getElementById('loading');
      if (root && root.children.length > 0 && loading) loading.style.display = 'none';
    }, 800);
  });
</script>

<script type="text/babel" data-presets="react">
try {

const { useState, useEffect, useMemo, useCallback } = React;


// ---------- helpers ----------
const pad = (n) => String(n).padStart(2, "0");
const toISO = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
const fromISO = (s) => {
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d);
};
const todayISO = () => toISO(new Date());

const DAY_NAMES = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
const MONTH_NAMES = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December",
];

function startOfWeek(d) {
  const date = new Date(d);
  const day = date.getDay(); // 0 = Sun
  const diff = day === 0 ? -6 : 1 - day; // week starts Monday
  date.setDate(date.getDate() + diff);
  date.setHours(0, 0, 0, 0);
  return date;
}
function addDays(d, n) {
  const date = new Date(d);
  date.setDate(date.getDate() + n);
  return date;
}
function minutesToHM(mins) {
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  if (h === 0) return `${m}m`;
  if (m === 0) return `${h}h`;
  return `${h}h ${m}m`;
}
function fmtDateLong(d) {
  return `${DAY_NAMES[d.getDay()]}, ${MONTH_NAMES[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}
function fmtDateShort(d) {
  return `${MONTH_NAMES[d.getMonth()].slice(0, 3)} ${d.getDate()}`;
}

const STORAGE_KEY = "site-log-entries";
const SHIFTS_KEY = "site-log-shifts";

const JOB_TYPES = [
  "Fiber TC",
  "Fiber Install",
  "Coax TC",
  "Coax Install",
  "Coax Self Install Rescue",
  "Drop Hang",
  "Equipment Pickup",
  "Tech Assist",
];

function SiteLog() {
  const [entries, setEntries] = useState([]);
  const [shifts, setShifts] = useState({}); // { 'YYYY-MM-DD': onSiteMinutes }
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState("log"); // log | day | week | month
  const [anchorDate, setAnchorDate] = useState(new Date());
  const [error, setError] = useState("");

  // form state
  const [jobType, setJobType] = useState(JOB_TYPES[0]);
  const [hrs, setHrs] = useState("");
  const [mins, setMins] = useState("");
  const [entryDate, setEntryDate] = useState(todayISO());
  const [description, setDescription] = useState("");
  const [manualPoints, setManualPoints] = useState("");
  const [editingId, setEditingId] = useState(null);

  // shift-hours input (Day tab)
  const [shiftHrs, setShiftHrs] = useState("");
  const [shiftMins, setShiftMins] = useState("");

  // ---------- load ----------
  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get(STORAGE_KEY, false);
        if (res && res.value) {
          setEntries(JSON.parse(res.value));
        }
      } catch (e) {
        // key not found on first run — that's fine
      }
      try {
        const res2 = await window.storage.get(SHIFTS_KEY, false);
        if (res2 && res2.value) {
          setShifts(JSON.parse(res2.value));
        }
      } catch (e) {
        // key not found on first run — that's fine
      } finally {
        setLoaded(true);
      }
    })();
  }, []);

  const persistShifts = useCallback(async (next) => {
    setShifts(next);
    try {
      const result = await window.storage.set(SHIFTS_KEY, JSON.stringify(next), false);
      if (!result) setError("Couldn't save shift hours — try again.");
    } catch (e) {
      setError("Couldn't save shift hours — try again.");
    }
  }, []);

  const persist = useCallback(async (next) => {
    setEntries(next);
    try {
      const result = await window.storage.set(STORAGE_KEY, JSON.stringify(next), false);
      if (!result) setError("Couldn't save — try again.");
      else setError("");
    } catch (e) {
      setError("Couldn't save — try again.");
    }
  }, []);

  // keep shift-hours inputs in sync with the day being viewed
  useEffect(() => {
    const iso = toISO(anchorDate);
    const m = shifts[iso];
    if (m) {
      setShiftHrs(String(Math.floor(m / 60)));
      setShiftMins(String(m % 60));
    } else {
      setShiftHrs("");
      setShiftMins("");
    }
  }, [anchorDate, shifts]);

  const saveShift = () => {
    const h = parseInt(shiftHrs, 10) || 0;
    const m = parseInt(shiftMins, 10) || 0;
    const total = h * 60 + m;
    const iso = toISO(anchorDate);
    const next = { ...shifts };
    if (total > 0) next[iso] = total;
    else delete next[iso];
    persistShifts(next);
  };

  // productive minutes = points converted back to minutes (covers manual work-order points too)
  const productiveMinutes = (list) => list.reduce((s, x) => s + x.points * 5, 0);
  const resetForm = () => {
    setJobType(JOB_TYPES[0]);
    setHrs("");
    setMins("");
    setDescription("");
    setManualPoints("");
    setEntryDate(todayISO());
    setEditingId(null);
  };

  const submitEntry = (e) => {
    e.preventDefault();
    const h = parseInt(hrs, 10) || 0;
    const m = parseInt(mins, 10) || 0;
    const totalMinutes = h * 60 + m;
    const hasManual = manualPoints !== "" && !Number.isNaN(parseInt(manualPoints, 10));
    if (totalMinutes <= 0 && !hasManual) {
      setError("Enter a duration or a work order point value.");
      return;
    }
    const points = hasManual ? parseInt(manualPoints, 10) : Math.round(totalMinutes / 5);
    const entry = {
      id: editingId || `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
      date: entryDate,
      jobType,
      minutes: totalMinutes,
      points,
      manual: hasManual,
      description: description.trim(),
      createdAt: editingId
        ? entries.find((x) => x.id === editingId)?.createdAt || Date.now()
        : Date.now(),
    };
    let next;
    if (editingId) {
      next = entries.map((x) => (x.id === editingId ? entry : x));
    } else {
      next = [...entries, entry];
    }
    next.sort((a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : b.createdAt - a.createdAt));
    persist(next);
    resetForm();
  };

  const editEntry = (id) => {
    const e = entries.find((x) => x.id === id);
    if (!e) return;
    setEditingId(id);
    setJobType(e.jobType || JOB_TYPES[0]);
    setHrs(e.minutes ? String(Math.floor(e.minutes / 60)) : "");
    setMins(e.minutes ? String(e.minutes % 60) : "");
    setEntryDate(e.date);
    setDescription(e.description || "");
    setManualPoints(e.manual ? String(e.points) : "");
    setTab("log");
  };

  const deleteEntry = (id) => {
    persist(entries.filter((x) => x.id !== id));
    if (editingId === id) resetForm();
  };

  // ---------- derived views ----------
  const todayEntries = useMemo(
    () => entries.filter((x) => x.date === todayISO()),
    [entries]
  );
  const todayPoints = todayEntries.reduce((s, x) => s + x.points, 0);

  const dayEntries = useMemo(
    () => entries.filter((x) => x.date === toISO(anchorDate)),
    [entries, anchorDate]
  );
  const dayPoints = dayEntries.reduce((s, x) => s + x.points, 0);
  const dayMinutes = dayEntries.reduce((s, x) => s + x.minutes, 0);
  const dayShiftMinutes = shifts[toISO(anchorDate)] || 0;
  const dayProductivePct = dayShiftMinutes > 0 ? Math.round((productiveMinutes(dayEntries) / dayShiftMinutes) * 100) : null;

  const weekStart = useMemo(() => startOfWeek(anchorDate), [anchorDate]);
  const weekDays = useMemo(
    () => Array.from({ length: 7 }, (_, i) => addDays(weekStart, i)),
    [weekStart]
  );
  const weekEntries = useMemo(() => {
    const isoSet = new Set(weekDays.map(toISO));
    return entries.filter((x) => isoSet.has(x.date));
  }, [entries, weekDays]);
  const weekPoints = weekEntries.reduce((s, x) => s + x.points, 0);
  const weekMinutes = weekEntries.reduce((s, x) => s + x.minutes, 0);
  const weekByDay = weekDays.map((d) => {
    const iso = toISO(d);
    const es = weekEntries.filter((x) => x.date === iso);
    const shiftM = shifts[iso] || 0;
    const prodM = productiveMinutes(es);
    return {
      date: d,
      points: es.reduce((s, x) => s + x.points, 0),
      shiftMinutes: shiftM,
      pct: shiftM > 0 ? Math.round((prodM / shiftM) * 100) : null,
    };
  });
  const maxWeekDayPoints = Math.max(1, ...weekByDay.map((d) => d.points));
  const weekShiftMinutes = weekByDay.reduce((s, d) => s + d.shiftMinutes, 0);
  const weekProductivePct = weekShiftMinutes > 0 ? Math.round((productiveMinutes(weekEntries) / weekShiftMinutes) * 100) : null;

  const monthEntries = useMemo(() => {
    const y = anchorDate.getFullYear();
    const m = anchorDate.getMonth();
    return entries.filter((x) => {
      const d = fromISO(x.date);
      return d.getFullYear() === y && d.getMonth() === m;
    });
  }, [entries, anchorDate]);
  const monthPoints = monthEntries.reduce((s, x) => s + x.points, 0);
  const monthMinutes = monthEntries.reduce((s, x) => s + x.minutes, 0);
  const monthShiftMinutes = useMemo(() => {
    const y = anchorDate.getFullYear();
    const m = anchorDate.getMonth();
    return Object.entries(shifts).reduce((sum, [iso, mins]) => {
      const d = fromISO(iso);
      return d.getFullYear() === y && d.getMonth() === m ? sum + mins : sum;
    }, 0);
  }, [shifts, anchorDate]);
  const monthProductivePct =
    monthShiftMinutes > 0 ? Math.round((productiveMinutes(monthEntries) / monthShiftMinutes) * 100) : null;
  const monthByJob = useMemo(() => {
    const map = {};
    monthEntries.forEach((x) => {
      map[x.jobType] = (map[x.jobType] || 0) + x.points;
    });
    return Object.entries(map).sort((a, b) => b[1] - a[1]);
  }, [monthEntries]);
  const monthByDate = useMemo(() => {
    const map = {};
    monthEntries.forEach((x) => {
      if (!map[x.date]) map[x.date] = { points: 0, entries: [] };
      map[x.date].points += x.points;
      map[x.date].entries.push(x);
    });
    return Object.entries(map)
      .map(([iso, v]) => {
        const shiftM = shifts[iso] || 0;
        const pct = shiftM > 0 ? Math.round((productiveMinutes(v.entries) / shiftM) * 100) : null;
        return [iso, v.points, pct];
      })
      .sort((a, b) => (a[0] < b[0] ? 1 : -1));
  }, [monthEntries, shifts]);

  // ---------- styles ----------
  const C = {
    bg: "#15171A",
    panel: "#1C1F23",
    panel2: "#23262B",
    border: "#31353B",
    text: "#E8E6E0",
    textMute: "#8B9096",
    accent: "#FF7A1A",
    accent2: "#3DDC97",
    danger: "#E5544C",
  };

  const mono = { fontFamily: "ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" };
  const sans = { fontFamily: "system-ui, -apple-system, 'Segoe UI', sans-serif" };

  if (!loaded) {
    return (
      <div style={{ ...sans, background: C.bg, color: C.textMute, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
        Loading log…
      </div>
    );
  }

  const TabButton = ({ id, label }) => (
    <button
      onClick={() => setTab(id)}
      style={{
        ...sans,
        flex: 1,
        padding: "10px 6px",
        background: tab === id ? C.accent : "transparent",
        color: tab === id ? "#171717" : C.textMute,
        border: "none",
        borderRadius: 8,
        fontSize: 13,
        fontWeight: 700,
        letterSpacing: 0.3,
        cursor: "pointer",
        transition: "all 0.15s",
      }}
    >
      {label}
    </button>
  );

  return (
    <div style={{ ...sans, background: C.bg, color: C.text, minHeight: "100vh", paddingBottom: 40 }}>
      {/* header */}
      <div style={{ padding: "20px 16px 14px", borderBottom: `1px solid ${C.border}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div>
            <div style={{ fontSize: 11, letterSpacing: 2, color: C.accent, fontWeight: 700, textTransform: "uppercase" }}>
              Site Log
            </div>
            <div style={{ fontSize: 20, fontWeight: 800, marginTop: 2 }}>Job Productivity Ticket</div>
          </div>
          <div
            style={{
              ...mono,
              border: `1px solid ${C.border}`,
              borderRadius: 6,
              padding: "3px 8px",
              fontSize: 10,
              color: C.textMute,
              transform: "rotate(2deg)",
              whiteSpace: "nowrap",
            }}
          >
            1 PT = 5 MIN
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginTop: 14 }}>
          <div style={{ ...mono, fontSize: 42, fontWeight: 800, color: C.accent2, lineHeight: 1, fontVariantNumeric: "tabular-nums" }}>
            {todayPoints}
          </div>
          <div style={{ fontSize: 13, color: C.textMute }}>
            pts today &nbsp;·&nbsp; {minutesToHM(todayEntries.reduce((s, x) => s + x.minutes, 0))}
          </div>
        </div>
      </div>

      {/* tabs */}
      <div style={{ display: "flex", gap: 6, padding: "12px 16px" }}>
        <TabButton id="log" label="LOG" />
        <TabButton id="day" label="DAY" />
        <TabButton id="week" label="WEEK" />
        <TabButton id="month" label="MONTH" />
      </div>

      <div style={{ padding: "0 16px" }}>
        {error && (
          <div style={{ background: "#3A2020", border: `1px solid ${C.danger}`, color: "#FFB3AE", borderRadius: 8, padding: "8px 12px", fontSize: 13, marginBottom: 12 }}>
            {error}
          </div>
        )}

        {/* ---------------- LOG TAB ---------------- */}
        {tab === "log" && (
          <div>
            <form
              onSubmit={submitEntry}
              style={{ background: C.panel, border: `1px solid ${C.border}`, borderRadius: 12, padding: 16, marginBottom: 18 }}
            >
              <div style={{ fontSize: 11, letterSpacing: 1.5, color: C.textMute, fontWeight: 700, marginBottom: 12, textTransform: "uppercase" }}>
                {editingId ? "Edit entry" : "New entry"}
              </div>

              <label style={{ fontSize: 12, color: C.textMute }}>Job type</label>
              <select
                value={jobType}
                onChange={(e) => setJobType(e.target.value)}
                style={{ ...inputStyle(C), colorScheme: "dark" }}
              >
                {JOB_TYPES.map((jt) => (
                  <option key={jt} value={jt}>
                    {jt}
                  </option>
                ))}
              </select>

              <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
                <div style={{ flex: 1 }}>
                  <label style={{ fontSize: 12, color: C.textMute }}>Hours</label>
                  <input
                    type="number"
                    min="0"
                    inputMode="numeric"
                    value={hrs}
                    onChange={(e) => setHrs(e.target.value)}
                    placeholder="0"
                    style={inputStyle(C)}
                  />
                </div>
                <div style={{ flex: 1 }}>
                  <label style={{ fontSize: 12, color: C.textMute }}>Minutes</label>
                  <input
                    type="number"
                    min="0"
                    max="59"
                    inputMode="numeric"
                    value={mins}
                    onChange={(e) => setMins(e.target.value)}
                    placeholder="0"
                    style={inputStyle(C)}
                  />
                </div>
                <div style={{ flex: 1 }}>
                  <label style={{ fontSize: 12, color: C.textMute }}>Date</label>
                  <input
                    type="date"
                    value={entryDate}
                    onChange={(e) => setEntryDate(e.target.value)}
                    style={{ ...inputStyle(C), colorScheme: "dark" }}
                  />
                </div>
              </div>

              <label style={{ fontSize: 12, color: C.textMute, marginTop: 10, display: "block" }}>
                Work order points <span style={{ color: C.textMute, fontWeight: 400 }}>(optional — overrides time-based points)</span>
              </label>
              <input
                type="number"
                min="0"
                inputMode="numeric"
                value={manualPoints}
                onChange={(e) => setManualPoints(e.target.value)}
                placeholder="e.g. 12"
                style={inputStyle(C)}
              />

              <label style={{ fontSize: 12, color: C.textMute, marginTop: 10, display: "block" }}>Description (optional)</label>
              <input
                value={description}
                onChange={(e) => setDescription(e.target.value)}
                placeholder="e.g. 142 Maple St, drop replacement"
                style={inputStyle(C)}
              />

              {manualPoints !== "" ? (
                <div style={{ ...mono, fontSize: 12, color: C.accent, marginTop: 10 }}>
                  = {parseInt(manualPoints, 10) || 0} pts (work order)
                </div>
              ) : (
                (parseInt(hrs, 10) || 0) + (parseInt(mins, 10) || 0) > 0 && (
                  <div style={{ ...mono, fontSize: 12, color: C.accent2, marginTop: 10 }}>
                    = {Math.round(((parseInt(hrs, 10) || 0) * 60 + (parseInt(mins, 10) || 0)) / 5)} pts
                  </div>
                )
              )}

              <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
                <button
                  type="submit"
                  style={{
                    ...sans,
                    flex: 1,
                    background: C.accent,
                    color: "#171717",
                    border: "none",
                    borderRadius: 8,
                    padding: "11px 0",
                    fontWeight: 800,
                    fontSize: 14,
                    cursor: "pointer",
                  }}
                >
                  {editingId ? "Save changes" : "Punch in entry"}
                </button>
                {editingId && (
                  <button
                    type="button"
                    onClick={resetForm}
                    style={{
                      ...sans,
                      background: "transparent",
                      color: C.textMute,
                      border: `1px solid ${C.border}`,
                      borderRadius: 8,
                      padding: "11px 16px",
                      fontWeight: 700,
                      fontSize: 14,
                      cursor: "pointer",
                    }}
                  >
                    Cancel
                  </button>
                )}
              </div>
            </form>

            <div style={{ fontSize: 11, letterSpacing: 1.5, color: C.textMute, fontWeight: 700, marginBottom: 10, textTransform: "uppercase" }}>
              Today's entries
            </div>
            {todayEntries.length === 0 ? (
              <EmptyState C={C} text="No entries logged today yet." />
            ) : (
              todayEntries.map((e) => (
                <EntryRow key={e.id} e={e} C={C} mono={mono} onEdit={editEntry} onDelete={deleteEntry} />
              ))
            )}
          </div>
        )}

        {/* ---------------- DAY TAB ---------------- */}
        {tab === "day" && (
          <div>
            <NavHeader
              C={C}
              label={fmtDateLong(anchorDate)}
              onPrev={() => setAnchorDate(addDays(anchorDate, -1))}
              onNext={() => setAnchorDate(addDays(anchorDate, 1))}
              onToday={() => setAnchorDate(new Date())}
            />
            <StatRow C={C} mono={mono} points={dayPoints} minutes={dayMinutes} pct={dayProductivePct} />

            <div style={{ background: C.panel, border: `1px solid ${C.border}`, borderRadius: 12, padding: "12px 14px", marginTop: 10 }}>
              <div style={{ fontSize: 10, color: C.textMute, letterSpacing: 1, textTransform: "uppercase", marginBottom: 8 }}>
                On-site hours (for productivity %)
              </div>
              <div style={{ display: "flex", gap: 8, alignItems: "flex-end" }}>
                <div style={{ flex: 1 }}>
                  <label style={{ fontSize: 11, color: C.textMute }}>Hours</label>
                  <input
                    type="number"
                    min="0"
                    inputMode="numeric"
                    value={shiftHrs}
                    onChange={(e) => setShiftHrs(e.target.value)}
                    placeholder="0"
                    style={inputStyle(C)}
                  />
                </div>
                <div style={{ flex: 1 }}>
                  <label style={{ fontSize: 11, color: C.textMute }}>Minutes</label>
                  <input
                    type="number"
                    min="0"
                    max="59"
                    inputMode="numeric"
                    value={shiftMins}
                    onChange={(e) => setShiftMins(e.target.value)}
                    placeholder="0"
                    style={inputStyle(C)}
                  />
                </div>
                <button
                  onClick={saveShift}
                  style={{
                    ...sans,
                    background: C.accent,
                    color: "#171717",
                    border: "none",
                    borderRadius: 7,
                    padding: "9px 14px",
                    fontWeight: 800,
                    fontSize: 13,
                    cursor: "pointer",
                    marginTop: 4,
                  }}
                >
                  Save
                </button>
              </div>
            </div>

            <div style={{ marginTop: 16, marginBottom: 8, fontSize: 11, letterSpacing: 1.5, color: C.textMute, fontWeight: 700, textTransform: "uppercase" }}>
              Entries
            </div>
            {dayEntries.length === 0 ? (
              <EmptyState C={C} text="Nothing logged this day." />
            ) : (
              dayEntries.map((e) => (
                <EntryRow key={e.id} e={e} C={C} mono={mono} onEdit={editEntry} onDelete={deleteEntry} />
              ))
            )}
          </div>
        )}

        {/* ---------------- WEEK TAB ---------------- */}
        {tab === "week" && (
          <div>
            <NavHeader
              C={C}
              label={`${fmtDateShort(weekStart)} – ${fmtDateShort(addDays(weekStart, 6))}, ${weekStart.getFullYear()}`}
              onPrev={() => setAnchorDate(addDays(anchorDate, -7))}
              onNext={() => setAnchorDate(addDays(anchorDate, 7))}
              onToday={() => setAnchorDate(new Date())}
            />
            <StatRow C={C} mono={mono} points={weekPoints} minutes={weekMinutes} pct={weekProductivePct} />

            <div style={{ display: "flex", gap: 6, alignItems: "flex-end", height: 90, margin: "16px 0 8px", background: C.panel, border: `1px solid ${C.border}`, borderRadius: 12, padding: "12px 10px 8px" }}>
              {weekByDay.map((d, i) => (
                <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                  <div
                    style={{
                      width: "100%",
                      height: Math.max(3, (d.points / maxWeekDayPoints) * 55),
                      background: toISO(d.date) === todayISO() ? C.accent : C.accent2,
                      borderRadius: 3,
                      opacity: d.points === 0 ? 0.25 : 1,
                    }}
                  />
                  <div style={{ fontSize: 10, color: C.textMute }}>{DAY_NAMES[d.date.getDay()]}</div>
                </div>
              ))}
            </div>

            <div style={{ background: C.panel, border: `1px solid ${C.border}`, borderRadius: 12, padding: "4px 14px", marginBottom: 8 }}>
              <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0 6px", fontSize: 10, color: C.textMute, textTransform: "uppercase", letterSpacing: 1 }}>
                <span>Day</span>
                <span>On-site % productive</span>
              </div>
              {weekByDay.map((d, i) => (
                <div
                  key={i}
                  onClick={() => {
                    setAnchorDate(d.date);
                    setTab("day");
                  }}
                  style={{
                    display: "flex",
                    justifyContent: "space-between",
                    alignItems: "center",
                    padding: "8px 0",
                    borderTop: `1px solid ${C.border}`,
                    cursor: "pointer",
                  }}
                >
                  <span style={{ fontSize: 13 }}>{fmtDateLong(d.date)}</span>
                  <span style={{ ...mono, fontSize: 13, fontWeight: 700, color: d.pct === null ? C.textMute : C.accent }}>
                    {d.pct === null ? "— no hours set" : `${d.pct}%`}
                  </span>
                </div>
              ))}
            </div>

            {weekEntries.length === 0 ? (
              <EmptyState C={C} text="Nothing logged this week." />
            ) : (
              weekDays.map((d) => {
                const iso = toISO(d);
                const es = weekEntries.filter((x) => x.date === iso);
                if (es.length === 0) return null;
                return (
                  <div key={iso} style={{ marginBottom: 10 }}>
                    <div style={{ fontSize: 11, color: C.textMute, fontWeight: 700, margin: "10px 0 6px" }}>
                      {fmtDateLong(d).toUpperCase()}
                    </div>
                    {es.map((e) => (
                      <EntryRow key={e.id} e={e} C={C} mono={mono} onEdit={editEntry} onDelete={deleteEntry} hideDate />
                    ))}
                  </div>
                );
              })
            )}
          </div>
        )}

        {/* ---------------- MONTH TAB ---------------- */}
        {tab === "month" && (
          <div>
            <NavHeader
              C={C}
              label={`${MONTH_NAMES[anchorDate.getMonth()]} ${anchorDate.getFullYear()}`}
              onPrev={() => setAnchorDate(new Date(anchorDate.getFullYear(), anchorDate.getMonth() - 1, 1))}
              onNext={() => setAnchorDate(new Date(anchorDate.getFullYear(), anchorDate.getMonth() + 1, 1))}
              onToday={() => setAnchorDate(new Date())}
            />
            <StatRow C={C} mono={mono} points={monthPoints} minutes={monthMinutes} pct={monthProductivePct} />

            {monthByJob.length > 0 && (
              <div style={{ marginTop: 16 }}>
                <div style={{ fontSize: 11, letterSpacing: 1.5, color: C.textMute, fontWeight: 700, marginBottom: 8, textTransform: "uppercase" }}>
                  By job
                </div>
                <div style={{ background: C.panel, border: `1px solid ${C.border}`, borderRadius: 12, padding: "4px 14px" }}>
                  {monthByJob.map(([j, pts], i) => (
                    <div
                      key={j}
                      style={{
                        display: "flex",
                        justifyContent: "space-between",
                        padding: "10px 0",
                        borderTop: i === 0 ? "none" : `1px solid ${C.border}`,
                      }}
                    >
                      <span style={{ fontSize: 14 }}>{j}</span>
                      <span style={{ ...mono, fontSize: 14, color: C.accent2, fontWeight: 700 }}>{pts} pt</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            <div style={{ marginTop: 16 }}>
              <div style={{ fontSize: 11, letterSpacing: 1.5, color: C.textMute, fontWeight: 700, marginBottom: 8, textTransform: "uppercase" }}>
                By day
              </div>
              {monthByDate.length === 0 ? (
                <EmptyState C={C} text="Nothing logged this month." />
              ) : (
                <div style={{ background: C.panel, border: `1px solid ${C.border}`, borderRadius: 12, padding: "4px 14px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0 6px", fontSize: 10, color: C.textMute, textTransform: "uppercase", letterSpacing: 1 }}>
                    <span>Date</span>
                    <span>Points · On-site %</span>
                  </div>
                  {monthByDate.map(([iso, pts, pct], i) => (
                    <div
                      key={iso}
                      onClick={() => {
                        setAnchorDate(fromISO(iso));
                        setTab("day");
                      }}
                      style={{
                        display: "flex",
                        justifyContent: "space-between",
                        padding: "10px 0",
                        borderTop: `1px solid ${C.border}`,
                        cursor: "pointer",
                      }}
                    >
                      <span style={{ fontSize: 14 }}>{fmtDateLong(fromISO(iso))}</span>
                      <span style={{ display: "flex", gap: 10 }}>
                        <span style={{ ...mono, fontSize: 14, color: C.accent2, fontWeight: 700 }}>{pts} pt</span>
                        <span style={{ ...mono, fontSize: 14, color: pct === null ? C.textMute : C.accent, fontWeight: 700 }}>
                          {pct === null ? "—" : `${pct}%`}
                        </span>
                      </span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ---------- shared sub-components ----------
function inputStyle(C) {
  return {
    width: "100%",
    boxSizing: "border-box",
    background: C.panel2,
    border: `1px solid ${C.border}`,
    borderRadius: 7,
    color: C.text,
    padding: "9px 10px",
    fontSize: 14,
    marginTop: 4,
    outline: "none",
  };
}

function NavHeader({ C, label, onPrev, onNext, onToday }) {
  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
      <button onClick={onPrev} style={navBtnStyle(C)} aria-label="Previous">
        ‹
      </button>
      <div style={{ textAlign: "center" }}>
        <div style={{ fontSize: 14, fontWeight: 700 }}>{label}</div>
        <button
          onClick={onToday}
          style={{ background: "none", border: "none", color: C.accent, fontSize: 11, cursor: "pointer", padding: 2 }}
        >
          Jump to today
        </button>
      </div>
      <button onClick={onNext} style={navBtnStyle(C)} aria-label="Next">
        ›
      </button>
    </div>
  );
}
function navBtnStyle(C) {
  return {
    background: C.panel,
    border: `1px solid ${C.border}`,
    color: C.text,
    borderRadius: 8,
    width: 36,
    height: 36,
    fontSize: 18,
    cursor: "pointer",
  };
}

function StatRow({ C, mono, points, minutes, pct }) {
  const pctColor = pct === null || pct === undefined ? C.textMute : pct >= 80 ? C.accent2 : pct >= 50 ? C.accent : "#E5544C";
  return (
    <div style={{ display: "flex", gap: 8 }}>
      <div style={{ flex: 1, background: C.panel, border: `1px solid ${C.border}`, borderRadius: 12, padding: "10px 10px" }}>
        <div style={{ fontSize: 9, color: C.textMute, letterSpacing: 0.5, textTransform: "uppercase" }}>Points</div>
        <div style={{ ...mono, fontSize: 21, fontWeight: 800, color: C.accent2 }}>{points}</div>
      </div>
      <div style={{ flex: 1, background: C.panel, border: `1px solid ${C.border}`, borderRadius: 12, padding: "10px 10px" }}>
        <div style={{ fontSize: 9, color: C.textMute, letterSpacing: 0.5, textTransform: "uppercase" }}>Time</div>
        <div style={{ ...mono, fontSize: 21, fontWeight: 800 }}>{minutes > 0 ? minutesToHM(minutes) : "0m"}</div>
      </div>
      <div style={{ flex: 1, background: C.panel, border: `1px solid ${C.border}`, borderRadius: 12, padding: "10px 10px" }}>
        <div style={{ fontSize: 9, color: C.textMute, letterSpacing: 0.5, textTransform: "uppercase" }}>On-site %</div>
        <div style={{ ...mono, fontSize: 21, fontWeight: 800, color: pctColor }}>
          {pct === null || pct === undefined ? "—" : `${pct}%`}
        </div>
      </div>
    </div>
  );
}

function EmptyState({ C, text }) {
  return (
    <div style={{ border: `1px dashed ${C.border}`, borderRadius: 12, padding: "22px 14px", textAlign: "center", color: C.textMute, fontSize: 13 }}>
      {text}
    </div>
  );
}

function EntryRow({ e, C, mono, onEdit, onDelete, hideDate }) {
  return (
    <div
      style={{
        background: C.panel,
        border: `1px solid ${C.border}`,
        borderRadius: 10,
        padding: "10px 12px",
        marginBottom: 8,
        display: "flex",
        justifyContent: "space-between",
        alignItems: "center",
        gap: 10,
      }}
    >
      <div style={{ minWidth: 0 }}>
        <div style={{ fontSize: 14, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
          {e.jobType}
        </div>
        <div style={{ fontSize: 11, color: C.textMute, marginTop: 2 }}>
          {!hideDate && `${fmtDateShort(fromISO(e.date))} · `}
          {e.minutes > 0 ? `${minutesToHM(e.minutes)} · ` : ""}
          {e.manual ? "work order · " : ""}
          {e.description || ""}
        </div>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
        <div style={{ ...mono, fontSize: 16, fontWeight: 800, color: e.manual ? C.accent : C.accent2 }}>{e.points}</div>
        <button
          onClick={() => onEdit(e.id)}
          style={{ background: "none", border: "none", color: C.textMute, cursor: "pointer", fontSize: 13, padding: 4 }}
        >
          Edit
        </button>
        <button
          onClick={() => onDelete(e.id)}
          style={{ background: "none", border: "none", color: C.danger, cursor: "pointer", fontSize: 13, padding: 4 }}
        >
          Delete
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<SiteLog />);
document.getElementById('loading').style.display = 'none';

} catch (err) {
  var box = document.getElementById('error-box');
  var loading = document.getElementById('loading');
  if (loading) loading.style.display = 'none';
  box.style.display = 'block';
  box.textContent = 'Script error:\n\n' + err.message + '\n\n' + (err.stack || '');
}
</script>
</body>
</html>
